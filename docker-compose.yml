services:
  mysql:
    image: mysql:8.1
    container_name: serranito_mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - serranito-network

  api-rest:
    image: ${DOCKERHUB_USERNAME}/serranito-api-rest:latest
    container_name: serranito_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - serranito-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/serranito-frontend:latest
    container_name: serranito_frontend
    restart: unless-stopped
    depends_on:
      - api-rest
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    networks:
      - serranito-network

volumes:
  mysql-data:

networks:
  serranito-network:
    driver: bridge
